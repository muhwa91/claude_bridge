[mypy]
# Keep global defaults (core + telegram_adapter already pass unconfigured mypy; no strict).

# discord.py ships py.typed, but its channel unions (Text/Voice/Forum/...) and overloads produce
# heavy union-attr noise at the adapter boundary. This thin, spike-proven wrapper (discord_adapter)
# treats discord symbols as Any. ignore_missing_imports + follow_imports=skip together keep it
# passing whether or not discord.py is installed (missing = Any / installed = analysis skipped).
# ASCII-only on purpose: configparser reads this file in the locale codec on Windows.
[mypy-discord.*]
ignore_missing_imports = True
follow_imports = skip

# Music playback deps (discord_adapter only): yt-dlp and imageio-ffmpeg ship no stubs,
# so treat them as Any (same rationale as discord.* above). ASCII-only.
[mypy-yt_dlp.*]
ignore_missing_imports = True

[mypy-imageio_ffmpeg.*]
ignore_missing_imports = True
